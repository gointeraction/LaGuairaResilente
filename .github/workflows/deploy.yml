name: Deploy to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install dependencies
        run: npm run install:all

      - name: Build project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: 'laguairaresilente.firebaseapp.com'
          VITE_FIREBASE_PROJECT_ID: 'laguairaresilente'
          VITE_FIREBASE_STORAGE_BUCKET: 'laguairaresilente.firebasestorage.app'
          VITE_FIREBASE_MESSAGING_SENDER_ID: '481417664267'
          VITE_FIREBASE_APP_ID: '1:481417664267:web:9bd74d219e25f1e44d740e'
          VITE_BASE_PATH: '/LaGuairaResilente/'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./app/dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
